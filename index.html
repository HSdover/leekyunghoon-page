<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>김동철 화이팅</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #111;
      font-family: "Malgun Gothic", sans-serif;
      overflow: hidden;
    }
    .text {
      font-size: 12vw;
      font-weight: 900;
      white-space: nowrap;
      background: linear-gradient(90deg,
        #ff0000, #ff8000, #ffff00, #00ff00,
        #00ffff, #0080ff, #8000ff, #ff0080, #ff0000);
      background-size: 400% 100%;
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      -webkit-text-fill-color: transparent;
      /* drop = 위에서 떨어지며 통통 튀는 효과 (3초마다 반복) */
      animation:
        rainbow 3s linear infinite,
        sparkle 0.8s ease-in-out infinite alternate,
        drop 3s cubic-bezier(0.5, 0, 0.5, 1) infinite;
    }
    @keyframes rainbow {
      from { background-position: 0% 50%; }
      to   { background-position: 400% 50%; }
    }
    @keyframes sparkle {
      from { filter: drop-shadow(0 0 6px rgba(255,255,255,0.4)) brightness(1); }
      to   { filter: drop-shadow(0 0 24px rgba(255,255,255,0.95)) brightness(1.4); }
    }
    @keyframes drop {
      0%   { transform: translateY(-120vh) scale(1) rotate(-6deg); }
      55%  { transform: translateY(0) scale(1) rotate(0deg); }
      67%  { transform: translateY(0) scaleY(0.78) scaleX(1.12); }   /* 바닥에 닿아 찌그러짐 */
      78%  { transform: translateY(-18vh) scaleY(1.05) scaleX(0.97); } /* 살짝 튀어오름 */
      88%  { transform: translateY(0) scaleY(0.92) scaleX(1.05); }
      100% { transform: translateY(0) scale(1) rotate(2deg); }
    }
  </style>
</head>
<body>
  <div class="text">김동철 화이팅</div>
</body>
</html>
