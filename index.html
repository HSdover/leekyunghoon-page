<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>박용준 살좀 쪄라</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      /* 내가 좋아하는 딥네이비 + 은은한 오로라 배경 */
      background:
        radial-gradient(circle at 30% 20%, rgba(45,212,191,0.18), transparent 45%),
        radial-gradient(circle at 75% 80%, rgba(139,92,246,0.20), transparent 45%),
        #0b1020;
      font-family: "Malgun Gothic", sans-serif;
      overflow: hidden;
    }
    .text {
      font-size: 11vw;
      font-weight: 900;
      white-space: nowrap;
      display: flex;
    }
    .text .space { width: 0.4em; }

    .text .ch {
      display: inline-block;
      /* 민트 → 시안 → 바이올렛 그라데이션 */
      background: linear-gradient(120deg, #5eead4, #38bdf8, #818cf8, #c084fc, #5eead4);
      background-size: 300% 100%;
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      -webkit-text-fill-color: transparent;
      transform: translateY(40px) scale(0.6);
      opacity: 0;
      animation:
        rise 0.8s cubic-bezier(0.2, 0.9, 0.3, 1.2) var(--d) forwards,
        flow 6s ease-in-out infinite,
        glow 2.4s ease-in-out calc(var(--d) + 0.8s) infinite;
    }
    /* 아래에서 부드럽게 떠오르며 등장 */
    @keyframes rise {
      0%   { transform: translateY(40px) scale(0.6); opacity: 0; }
      60%  { transform: translateY(-8px) scale(1.08); opacity: 1; }
      100% { transform: translateY(0) scale(1); opacity: 1; }
    }
    /* 색이 천천히 흐름 */
    @keyframes flow {
      0%, 100% { background-position: 0% 50%; }
      50%      { background-position: 100% 50%; }
    }
    /* 은은하게 맥동하는 글로우 + 살짝 둥실 */
    @keyframes glow {
      0%, 100% {
        filter: drop-shadow(0 0 6px rgba(94,234,212,0.5)) brightness(1);
        transform: translateY(0);
      }
      50% {
        filter: drop-shadow(0 0 22px rgba(129,140,248,0.9)) brightness(1.25);
        transform: translateY(-7px);
      }
    }
  </style>
</head>
<body>
  <div class="text" id="text"></div>
  <script>
    const str = "박용준 살좀 쪄라";
    const box = document.getElementById("text");
    let i = 0;
    for (const c of str) {
      if (c === " ") {
        const sp = document.createElement("span");
        sp.className = "space";
        box.appendChild(sp);
        continue;
      }
      const span = document.createElement("span");
      span.className = "ch";
      span.textContent = c;
      span.style.setProperty("--d", (i * 0.12) + "s");
      box.appendChild(span);
      i++;
    }
  </script>
</body>
</html>
