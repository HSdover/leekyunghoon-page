<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>메인페이지</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #111;
      font-family: "Malgun Gothic", sans-serif;
      overflow: hidden;
    }
    .text {
      font-size: 12vw;
      font-weight: 900;
      background: linear-gradient(90deg,
        #ff0000, #ff8000, #ffff00, #00ff00,
        #00ffff, #0080ff, #8000ff, #ff0080, #ff0000);
      background-size: 400% 100%;
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      -webkit-text-fill-color: transparent;
      animation: rainbow 3s linear infinite, sparkle 0.8s ease-in-out infinite alternate;
    }
    @keyframes rainbow {
      from { background-position: 0% 50%; }
      to   { background-position: 400% 50%; }
    }
    @keyframes sparkle {
      from {
        transform: scale(1) rotate(-2deg);
        filter: drop-shadow(0 0 6px rgba(255,255,255,0.4)) brightness(1);
      }
      to {
        transform: scale(1.08) rotate(2deg);
        filter: drop-shadow(0 0 24px rgba(255,255,255,0.95)) brightness(1.4);
      }
    }
  </style>
</head>
<body>
  <div class="text">이경훈바보</div>
</body>
</html>
